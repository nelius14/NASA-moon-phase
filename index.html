<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Moon">
  <title>Moon Phase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: rgba(228, 218, 188, 0.90);
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      user-select: none;
      -webkit-user-select: none;
      /* safe area for notched devices */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Two-column layout ───────────────── */
    .layout {
      display: flex;
      align-items: center;
      gap: 4rem;
      padding: 2rem;
      animation: rise 1.2s ease both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Portrait: stack moon on top, info below */
    @media (orientation: portrait) {
      .layout {
        flex-direction: column;
        gap: 2.5rem;
        justify-content: center;
      }
      .moon-ring {
        width: min(80vw, 480px) !important;
        height: min(80vw, 480px) !important;
      }
      .info {
        align-items: center;
        text-align: center;
        gap: 1.4rem !important;
      }
      .time { font-size: 2rem !important; }
      .phase-name { font-size: 1.5rem !important; }
      .stats { flex-direction: row !important; gap: 2rem !important; }
      .stat { align-items: center; }
      .events { flex-direction: row !important; gap: 1.6rem !important; }
      .divider { display: none; }
    }

    /* ── Moon ────────────────────────────── */
    .moon-ring {
      flex-shrink: 0;
      width: min(82vh, 680px);
      height: min(82vh, 680px);
      border-radius: 50%;
      overflow: hidden;
      position: relative;
    }

    #moon-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .moon-status {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(8,8,8,0.8);
      font-family: 'Inconsolata', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(180,172,155,0.5);
      text-align: center;
      padding: 2rem;
      line-height: 1.9;
      transition: opacity 0.5s;
    }
    .moon-status.hidden { opacity: 0; pointer-events: none; }

    /* ── Info panel ──────────────────────── */
    .info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* date + time */
    .dateline {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .date {
      font-family: 'Inconsolata', monospace;
      font-size: 2rem;
      letter-spacing: 0.18em;
      color: rgba(180,172,155,0.45);
      text-transform: uppercase;
    }
    .time {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 18cqw, 12rem) ;
      font-weight: 300;
      color: rgba(228,218,188,0.88);
      letter-spacing: -0.01em;
      line-height: 1;
      white-space: nowrap;
    }

    /* phase */
    .phase-block {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .phase-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: rgba(180,172,155,0.4);
      text-transform: uppercase;
    }
    .phase-name {
      font-size: clamp(2rem, 4.5vw, 4rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: rgba(228,218,188,0.92);
    }

    /* stats grid */
    .stats {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }
    .stat-value {
      font-family: 'Inconsolata', monospace;
      font-size: 1.2rem;
      color: rgba(228,218,188,0.88);
      letter-spacing: 0.03em;
    }
    .stat-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.14em;
      color: rgba(180,172,155,0.38);
      text-transform: uppercase;
    }

    /* divider */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(228,218,188,0.08);
    }

    /* upcoming events */
    .events-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: rgba(180,172,155,0.4);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .events {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .event {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .event-icon { font-size: 1rem; line-height: 1; width: 1.2rem; text-align: center; }
    .event-text { display: flex; flex-direction: column; gap: 0.05rem; }
    .event-name { font-family: 'Inconsolata', monospace; font-size: 0.68rem; letter-spacing: 0.06em; color: rgba(200,193,172,0.7); }
    .event-days { font-family: 'Inconsolata', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: rgba(180,172,155,0.38); text-transform: uppercase; }

    /* credit */
    .credit {
      font-family: 'Inconsolata', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.09em;
      color: rgba(180,172,155,0.18);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Left: moon photograph -->
  <div class="moon-ring" id="moon-ring">
    <img id="moon-img" src="" alt="moon phase" decoding="async">
    <div class="moon-status" id="moon-status">loading image…</div>
  </div>

  <!-- Right: information -->
  <div class="info">

    <div class="dateline">
      <div class="date" id="date-display">—</div>
      <div class="time" id="time-display">—</div>
    </div>

    <div class="phase-block">
      <div class="phase-label">Current phase</div>
      <div class="phase-name" id="phase-name">—</div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="illum">—</span>
        <span class="stat-label">Illuminated</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="age">—</span>
        <span class="stat-label">Day of cycle</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="next-full">—</span>
        <span class="stat-label">Days to full moon</span>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="events-label">Upcoming</div>
      <div class="events" id="events"></div>
    </div>

    <div class="credit">NASA SVS · Lunar Reconnaissance Orbiter · Public domain</div>

  </div>
</div>

<script>
// ── Lunar maths ──────────────────────────────────────────────
const CYCLE = 29.530588853;
const EPOCH = 2451550.1; // Jan 6, 2000 18:14 UTC (known new moon)

function toJD(d) { return d / 86400000 + 2440587.5; }

function moonData(date) {
  const age   = ((toJD(date) - EPOCH) % CYCLE + CYCLE) % CYCLE;
  const phase = age / CYCLE;
  const illum = (1 - Math.cos(phase * 2 * Math.PI)) / 2;
  return { phase, age, illum };
}

function phaseName(p) {
  if (p < 0.025 || p >= 0.975) return 'New Moon';
  if (p < 0.225) return 'Waxing Crescent';
  if (p < 0.275) return 'First Quarter';
  if (p < 0.475) return 'Waxing Gibbous';
  if (p < 0.525) return 'Full Moon';
  if (p < 0.725) return 'Waning Gibbous';
  if (p < 0.775) return 'Last Quarter';
  return 'Waning Crescent';
}

function daysTo(age, frac) {
  let d = frac * CYCLE - age;
  if (d <= 0.05) d += CYCLE;
  return d;
}

// ── NASA SVS frame lookup ────────────────────────────────────
// SVS-5187: 8784 frames, one per UTC hour of 2024 (leap year).
// Frame 1 = Jan 1, 2024 00:00 UTC. Public domain.
const JD_JAN1_2024   = 2460310.5;
const FRAMES_IN_2024 = 8784;
const BASE = 'https://svs.gsfc.nasa.gov/vis/a000000/a005100/a005187/frames/730x730_1x1_30p/';
const AGE_AT_FRAME1  = ((JD_JAN1_2024 - EPOCH) % CYCLE + CYCLE) % CYCLE;

function frameUrl(phase) {
  let offset = phase * CYCLE - AGE_AT_FRAME1;
  if (offset < 0) offset += CYCLE;
  let frame = Math.round(offset * 24) + 1;
  if (frame < 1)              frame += FRAMES_IN_2024;
  if (frame > FRAMES_IN_2024) frame = ((frame - 1) % FRAMES_IN_2024) + 1;
  return BASE + 'moon.' + String(frame).padStart(4, '0') + '.jpg';
}

// ── Clock ────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('date-display').textContent =
    n.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).toUpperCase();
  document.getElementById('time-display').textContent =
    n.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

// ── Boot ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  tick();
  setInterval(tick, 60000);

  // Refresh moon photo when iPad wakes from sleep
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      tick();
      // Reload image in case phase has changed since last wake
      const { phase: p2, age: a2, illum: i2 } = moonData(new Date());
      img.src = frameUrl(p2) + '?t=' + Date.now();
    }
  });

  const now = new Date();
  const { phase, age, illum } = moonData(now);

  // Photo
  const img    = document.getElementById('moon-img');
  const status = document.getElementById('moon-status');
  const ring   = document.getElementById('moon-ring');

  img.src = frameUrl(phase);

  img.onload = () => {
    status.classList.add('hidden');
  };

  img.onerror = () => {
    status.innerHTML =
      'NASA image unavailable.<br><br>' +
      'Serve via local server:<br>' +
      'python3 -m http.server 8080<br>' +
      'then open localhost:8080/moon-newtab.html';
  };

  // Text
  document.getElementById('phase-name').textContent = phaseName(phase);
  document.getElementById('illum').textContent       = Math.round(illum * 100) + '%';
  document.getElementById('age').textContent         = age.toFixed(1) + ' d';
  document.getElementById('next-full').textContent   = daysTo(age, 0.5).toFixed(1) + ' d';

  // Events
  const upcoming = [
    { frac:0.25, label:'First Quarter', icon:'🌓' },
    { frac:0.5,  label:'Full Moon',     icon:'🌕' },
    { frac:0.75, label:'Last Quarter',  icon:'🌗' },
    { frac:1.0,  label:'New Moon',      icon:'🌑' },
  ]
  .map(e => ({ ...e, days: daysTo(age, e.frac) }))
  .sort((a, b) => a.days - b.days)
  .slice(0, 3);

  const evEl = document.getElementById('events');
  upcoming.forEach(e => {
    const d = document.createElement('div');
    d.className = 'event';
    d.innerHTML =
      `<span class="event-icon">${e.icon}</span>` +
      `<div class="event-text">` +
        `<span class="event-name">${e.label}</span>` +
        `<span class="event-days">in ${e.days.toFixed(1)} days</span>` +
      `</div>`;
    evEl.appendChild(d);
  });
});
</script>
</body>
</html>
